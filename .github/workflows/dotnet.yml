name: CI/CD Pipeline - Parking Management System
 
on:
  push:
    branches: [ "master", "Csharp_development_CICDnew" ]
  pull_request:
    branches: [ "master", "Csharp_development_CICDnew" ]
 
permissions:
  contents: read
  security-events: write
 
env:
  DOTNET_VERSION: '8.0.x'
  API_PROJECT_PATH: "CSharp Parking API/CSharp Parking API.csproj"
  TEST_PROJECT_PATH: "CSharp Parking Tests/CSharp Parking Tests.csproj"
  COVERAGE_SETTINGS_PATH: "CSharp Parking Tests/coverlet.runsettings"
  MIN_LINE_COVERAGE: 80.0
  MIN_BRANCH_COVERAGE: 80.0
  DOTNET_ROOT: /usr/share/dotnet
 
# ============================================================
# JOB 1 — BUILD & TEST
# ============================================================
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
 
      - run: dotnet restore "${{ env.API_PROJECT_PATH }}"
      - run: dotnet restore "${{ env.TEST_PROJECT_PATH }}"
 
      - run: dotnet build "${{ env.API_PROJECT_PATH }}" --configuration Release --no-restore
      - run: dotnet build "${{ env.TEST_PROJECT_PATH }}" --configuration Release --no-restore
 
      - name: Run tests with coverage
        run: |
          dotnet test "${{ env.TEST_PROJECT_PATH }}" \
            --configuration Release \
            --no-restore \
            --settings "${{ env.COVERAGE_SETTINGS_PATH }}" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results || true
 
      - run: dotnet tool install -g dotnet-reportgenerator-globaltool
 
      - name: Generate coverage report
        run: |
          reportgenerator \
            "-reports:./test-results/**/coverage.cobertura.xml" \
            "-targetdir:coveragereport" \
            "-reporttypes:TextSummary"
 
      - name: Enforce branch coverage
        run: |
          BRANCH=$(grep -oP '(?<=Branch coverage: )\d+(\.\d+)?' coveragereport/Summary.txt || echo 0)
          echo "Branch coverage: $BRANCH%"
          if (( $(echo "$BRANCH < ${{ env.MIN_BRANCH_COVERAGE }}" | bc -l) )); then
            echo "❌ Branch coverage too low"
            exit 1
          fi
 
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coveragereport/
 
# ============================================================
# JOB 2 — SECURITY SCAN
# ============================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
 
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
 
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
 
# ============================================================
# JOB 3 — STAGING DEPLOY
# ============================================================
  deploy-staging:
    runs-on: self-hosted
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/Csharp_development_CICDnew'
    environment: staging
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Build Docker image
        run: docker build -t parking-api-staging:${{ github.run_id }} -f "CSharp Parking API/Dockerfile" .
 
      - name: Save Docker image
        run: docker save parking-api-staging:${{ github.run_id }} -o parking-api-image.tar
 
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
 
      - name: Copy image to server (staging)
        run: |
          sshpass -p "$DOCKER_SERVER_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            parking-api-image.tar \
            $DOCKER_SERVER_USER@$DOCKER_SERVER_IP:/tmp/parking-api-staging.tar
        env:
          DOCKER_SERVER_USER: ${{ secrets.DOCKER_SERVER_USER }}
          DOCKER_SERVER_IP: ${{ secrets.DOCKER_SERVER_IP }}
          DOCKER_SERVER_PASSWORD: ${{ secrets.DOCKER_SERVER_PASSWORD }}
 
      - name: Deploy staging container
        run: |
          sshpass -p "$DOCKER_SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            $DOCKER_SERVER_USER@$DOCKER_SERVER_IP << EOF
              docker load -i /tmp/parking-api-staging.tar
              docker stop parking-api-staging || true
              docker rm parking-api-staging || true
              docker run -d \
                --name parking-api-staging \
                -p 8400:80 \
                parking-api-staging:${{ github.run_id }}
          EOF
        env:
          DOCKER_SERVER_USER: ${{ secrets.DOCKER_SERVER_USER }}
          DOCKER_SERVER_IP: ${{ secrets.DOCKER_SERVER_IP }}
          DOCKER_SERVER_PASSWORD: ${{ secrets.DOCKER_SERVER_PASSWORD }}
 
# ============================================================
# JOB 4 — PRODUCTION DEPLOY
# ============================================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/master'
    environment: production
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
 
      - name: Copy image to server (production)
        run: |
          sshpass -p "$DOCKER_SERVER_PASSWORD" scp \
            -o StrictHostKeyChecking=no \
            parking-api-image.tar \
            $DOCKER_SERVER_USER@$DOCKER_SERVER_IP:/tmp/parking-api-prod.tar
        env:
          DOCKER_SERVER_USER: ${{ secrets.DOCKER_SERVER_USER }}
          DOCKER_SERVER_IP: ${{ secrets.DOCKER_SERVER_IP }}
          DOCKER_SERVER_PASSWORD: ${{ secrets.DOCKER_SERVER_PASSWORD }}
 
      - name: Deploy production container
        run: |
          sshpass -p "$DOCKER_SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            $DOCKER_SERVER_USER@$DOCKER_SERVER_IP << EOF
              docker load -i /tmp/parking-api-prod.tar
              docker stop parking-api-prod || true
              docker rm parking-api-prod || true
              docker run -d \
                --name parking-api-prod \
                -p 8401:80 \
                parking-api-staging:${{ github.run_id }}
          EOF
        env:
          DOCKER_SERVER_USER: ${{ secrets.DOCKER_SERVER_USER }}
          DOCKER_SERVER_IP: ${{ secrets.DOCKER_SERVER_IP }}
          DOCKER_SERVER_PASSWORD: ${{ secrets.DOCKER_SERVER_PASSWORD }}
 
  # Job 5: Notifications
  notifications:
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan, deploy-staging]
    if: always()
    steps:
      - name: Pipeline success notification
        if: needs.build-and-test.result == 'success' && needs.security-scan.result == 'success'
        run: |
          echo "CI/CD Pipeline Successful!"
          echo "Tests: PASSED"
          echo "Security: PASSED"
          echo "Deployment: Ready"

      - name: Pipeline failure notification
        if: failure()
        run: |
          echo "CI/CD Pipeline Failed!"
          echo "Check the logs above for failure details"
          echo "Common fixes:"
          echo "  - Check test failures in test-results"
          echo "  - Verify coverage meets 80% requirement"
          echo "  - Review security scan results"
