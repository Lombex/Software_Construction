version: 2
updates:
  # Enable version updates for NuGet packages
  - package-ecosystem: "nuget"
    directory: "/CSharp Parking API"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Lombex"
    assignees:
      - "Lombex"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"

  # Enable version updates for NuGet packages in tests
  - package-ecosystem: "nuget"
    directory: "/CSharp Parking Tests"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Lombex"
    assignees:
      - "Lombex"
    commit-message:
      prefix: "deps-test"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Lombex"
    assignees:
      - "Lombex"
    commit-message:
      prefix: "ci"
      include: "scope"